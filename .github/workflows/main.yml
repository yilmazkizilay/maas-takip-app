name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Kurulum
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" wheel setuptools buildozer
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential libltdl-dev python3-pip lld
      - name: Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug
      - uses: actions/upload-artifact@v4
        with:
          name: temiz-apk
          path: bin/*.apk
