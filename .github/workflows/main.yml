name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Sistem Paketlerini Hazirla
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-dev python3-setuptools build-essential libltdl-dev python3-pip
          # En güncel Buildozer'ı doğrudan kaynağından yüklüyoruz
          pip3 install --user --upgrade https://github.com/kivy/buildozer/archive/master.zip
          pip3 install --user --upgrade cython

      - name: APK Hazirla
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Sadece APK üretmesi için komutu netleştiriyoruz
          yes | buildozer -v android debug
