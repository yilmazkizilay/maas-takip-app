name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Java Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sistem Paketlerini Hazirla
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential libltdl-dev python3-pip lld openjdk-17-jdk
          pip install --upgrade pip
          pip install --user --upgrade buildozer cython virtualenv

      - name: APK Hazirla (Buildozer)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Soru sormadan, temiz build al
          yes | buildozer -v android debug
