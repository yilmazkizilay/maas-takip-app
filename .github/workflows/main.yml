name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # En stabil sürümde sabitliyoruz

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python ve Sistem Paketlerini Kur
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev python3-dev python3-setuptools
          sudo apt install -y build-essential libltdl-dev python3-pip cython3
          pip3 install --user --upgrade buildozer cython

      - name: APK Hazirla (Buildozer)
        run: |
          # Buildozer'ı sistem yoluna ekliyoruz ve basliyoruz
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: maas-takip-apk
          path: bin/*.apk
