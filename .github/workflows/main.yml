name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python ve Temel Araclar
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem Paketlerini Kur (Eksiksiz)
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential libltdl-dev python3-pip openjdk-17-jdk
          pip install --upgrade pip
          pip install --user --upgrade buildozer cython virtualenv

      - name: APK Hazirla (Buildozer)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Buildozer'in en taze halini burada garantiliyoruz
          yes | buildozer -v android debug
