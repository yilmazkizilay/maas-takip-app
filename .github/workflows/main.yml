name: Build APK
on: [push]

jobs:
  build:
    # En stabil sürüm olan 22.04'ü kullanıyoruz
    runs-on: ubuntu-22.04

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem Paketlerini Hazirla
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential libltdl-dev python3-pip openjdk-17-jdk lld
          pip install --upgrade pip
          pip install --user --upgrade buildozer cython virtualenv sh

      - name: APK Hazirla (Buildozer)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Her şeyi sıfırlayıp tertemiz bir build alıyoruz
          buildozer android clean
          yes | buildozer -v android debug
